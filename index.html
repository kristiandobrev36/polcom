<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Политически компас - България</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #ffffff;
            --card: #f8fafc;
            --text: #0f172a;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #e2e8f0;
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        #app-container {
            background: var(--bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 700px;
            text-align: center;
            border: 2px solid #cbd5e1;
        }

        h1 { font-size: 2.5rem; color: var(--primary); margin-bottom: 20px; }
        p { font-size: 1.3rem; line-height: 1.5; color: #334155; }
        
        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.3s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .lang-btn {
            background: #f1f5f9;
            border: 3px solid #cbd5e1;
            padding: 25px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .flag-icon { width: 70px; height: 50px; margin-bottom: 10px; border: 1px solid #ddd; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; }
        .btn {
            padding: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }
        .btn:active { transform: translateY(2px); box-shadow: none; }
        
        .btn-sa { background: #166534; } 
        .btn-a  { background: #22c55e; } 
        .btn-n  { background: #64748b; } 
        .btn-d  { background: #ef4444; } 
        .btn-sd { background: #991b1b; } 
        .btn-primary { background: var(--primary); padding: 20px 50px; font-size: 1.5rem; margin-top: 20px; }

        #ideology-label {
            font-size: 2.8rem;
            font-weight: 900;
            margin: 20px 0;
            text-transform: uppercase;
            padding: 10px;
            border: 6px solid;
            display: inline-block;
            transform: rotate(-1.5deg);
        }

        canvas { background: white; border: 5px solid #334155; border-radius: 10px; width: 100%; max-width: 400px; }
        .party-box {
            background: #fefce8;
            border: 3px dashed #eab308;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            font-size: 1.3rem;
        }
        .search-box { width: 100%; padding: 15px; font-size: 1.2rem; border: 2px solid #cbd5e1; border-radius: 8px; margin-top: 10px; box-sizing: border-box; }
        .leader-item { padding: 15px; background: #f1f5f9; border-bottom: 1px solid #ddd; cursor: pointer; font-size: 1.2rem; text-align: left; }
    </style>
</head>
<body>

<div id="app-container">
    
    <div id="screen-welcome" class="screen active">
        <h1>🧭 Политически Тест</h1>
        <p>Разберете Вашите политически възгледи. <br><b>С големи бутони и ясен текст.</b></p>
        <button class="btn btn-primary" onclick="showScreen('screen-lang')">ЗАПОЧНИ</button>
    </div>

    <div id="screen-lang" class="screen">
        <h2>Изберете език:</h2>
        <div class="lang-grid">
            <button class="lang-btn" onclick="setLang('bg')"><img src="https://flagcdn.com/bg.svg" class="flag-icon"> Български</button>
            <button class="lang-btn" onclick="setLang('en')"><img src="https://flagcdn.com/us.svg" class="flag-icon"> English</button>
        </div>
    </div>

    <div id="screen-quiz" class="screen">
        <div id="progress" style="font-weight: bold; font-size: 1.2rem; margin-bottom: 10px;">Въпрос 1 от 24</div>
        <div id="q-text" style="font-size: 1.6rem; min-height: 140px; font-weight: bold; padding: 20px; background: #f8fafc; border-radius: 10px; border: 1px solid #cbd5e1; display: flex; align-items: center; justify-content: center;">...</div>
        <div class="btn-group">
            <button class="btn btn-sa" id="btn-sa" onclick="answer(2)">Напълно съгласен</button>
            <button class="btn btn-a" id="btn-a" onclick="answer(1)">Съгласен</button>
            <button class="btn btn-n" id="btn-n" onclick="answer(0)">Нито едното / Неутрално</button>
            <button class="btn btn-d" id="btn-d" onclick="answer(-1)">Несъгласен</button>
            <button class="btn btn-sd" id="btn-sd" onclick="answer(-2)">Напълно несъгласен</button>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <h2 id="res-title">Вашият резултат</h2>
        <div id="ideology-label"></div>
        <canvas id="compassCanvas" width="400" height="400"></canvas>
        <div class="party-box" id="party-recommendation"></div>
        <div style="text-align: left; margin-top: 30px;">
            <b id="compare-lbl" style="font-size: 1.3rem;">Сравни с лидери:</b>
            <input type="text" class="search-box" id="leader-in" placeholder="Търси име..." onkeyup="searchLeaders()">
            <div id="leader-list" style="max-height: 200px; overflow-y: auto; border: 1px solid #ddd;"></div>
        </div>
        <button class="btn btn-primary" onclick="location.reload()" style="width:100%; margin-top:30px;">НОВ ТЕСТ</button>
    </div>
</div>

<script>
    const leaders = [
        { name: "Тодор Живков", x: -8, y: -9 },
        { name: "Стефан Стамболов", x: 4, y: -7 },
        { name: "Христо Ботев", x: -7, y: 9 },
        { name: "Васил Левски", x: -4, y: 8 },
        { name: "Георги Димитров", x: -9, y: -10 },
        { name: "Симеон Сакскобургготски", x: 5, y: -2 },
        { name: "Бойко Борисов", x: 4, y: -4 },
        { name: "Кирил Петков", x: -2, y: 2 },
        { name: "Костадин Костадинов", x: 3, y: -8 },
        { name: "Йосиф Сталин", x: -9, y: -10 },
        { name: "Адолф Хитлер", x: 6, y: -9 },
        { name: "Доналд Тръмп", x: 7, y: -4 },
        { name: "Владимир Путин", x: 8, y: -8 },
        { name: "Уинстън Чърчил", x: 5, y: -6 }
    ];

    const translations = {
        bg: {
            btns: ["Напълно съгласен", "Съгласен", "Неутрално", "Несъгласен", "Напълно несъгласен"],
            res: "Вие сте:",
            axes: ["Власт", "Свобода", "Ляво", "Дясно"],
            labels: ["ТИ СИ КОМУНИСТ!", "ТИ СИ КОНСЕРВАТОР!", "ТИ СИ ПРОГРЕСИВЕН!", "ТИ СИ ЛИБЕРТАРИАНЕЦ!", "ТИ СИ ЦЕНТРИСТ!"],
            parties: {
                centrist: "<b>ПП-ДБ / ГЕРБ</b><br>Вие сте умерен и балансиран.",
                authLeft: "<b>БСП / Левицата!</b>",
                authRight: "<b>Възраждане / ГЕРБ</b>",
                libLeft: "<b>Зелено движение / ПП-ДБ</b>",
                libRight: "<b>ИТН / ПП-ДБ</b>"
            },
            qs: [
                { t: "Богатите трябва да плащат много по-високи данъци за болници и пенсии.", a: "x", w: -1 },
                { t: "Държавата не трябва да пречи на фирмите да печелят пари.", a: "x", w: 1 },
                { t: "Здравеопазването трябва да е безплатно за всеки.", a: "x", w: -1 },
                { t: "Електричеството и водата трябва да са държавни.", a: "x", w: -1 },
                { t: "Ако човек е беден, вероятно е защото не работи достатъчно.", a: "x", w: 1 },
                { t: "Приватизацията е по-добра от държавното управление.", a: "x", w: 1 },
                { t: "Данъците трябва да са ниски за всички.", a: "x", w: 1 },
                { t: "Държавата трябва да гарантира работа на всеки.", a: "x", w: -1 },
                { t: "Синдикатите са полезни.", a: "x", w: -1 },
                { t: "Свободният пазар решава проблемите по-добре от политиците.", a: "x", w: 1 },
                { t: "Трябва да има таван на наемите.", a: "x", w: -1 },
                { t: "Конкуренцията е най-важното нещо за икономиката.", a: "x", w: 1 },
                { t: "Децата трябва да се учат на дисциплина и уважение към властта.", a: "y", w: -1 },
                { t: "Всеки трябва да е свободен да прави каквото иска в дома си.", a: "y", w: 1 },
                { t: "Трябва ни силна армия и полиция.", a: "y", w: -1 },
                { t: "Държавата трябва да може да подслушва телефони за сигурност.", a: "y", w: -1 },
                { t: "Традициите са по-важни от новите модерни идеи.", a: "y", w: -1 },
                { t: "Религията трябва да участва в законите.", a: "y", w: -1 },
                { t: "Смъртното наказание трябва да съществува.", a: "y", w: -1 },
                { t: "Всеки може да казва каквото мисли, дори да е обидно.", a: "y", w: 1 },
                { t: "Държавата няма право да ми казва как да живея.", a: "y", w: 1 },
                { t: "Трябва да пазим националните ценности.", a: "y", w: -1 },
                { t: "Силният лидер е по-добър от дебатите в парламента.", a: "y", w: -1 },
                { t: "Личната свобода е по-важна от сигурността.", a: "y", w: 1 }
            ]
        },
        en: {
            btns: ["Strongly Agree", "Agree", "Neutral", "Disagree", "Strongly Disagree"],
            res: "You are:",
            axes: ["Authority", "Liberty", "Left", "Right"],
            labels: ["YOU ARE COMMUNIST!", "YOU ARE CONSERVATIVE!", "YOU ARE PROGRESSIVE!", "YOU ARE LIBERTARIAN!", "YOU ARE CENTRIST!"],
            parties: {
                centrist: "<b>PP-DB / GERB</b><br>You are a moderate.",
                authLeft: "<b>BSP / The Left!</b>",
                authRight: "<b>Vazrazhdane / GERB</b>",
                libLeft: "<b>Greens / PP-DB</b>",
                libRight: "<b>ITN / PP-DB</b>"
            },
            qs: [ /* Re-using same questions */ ]
        }
    };

    let lang = 'bg';
    let qIdx = 0;
    let scoreX = 0, scoreY = 0;
    let selectedLeaders = [];

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function setLang(l) {
        lang = l;
        qIdx = 0; scoreX = 0; scoreY = 0;
        updateQuiz();
        showScreen('screen-quiz');
    }

    function updateQuiz() {
        const d = translations[lang];
        const qsList = lang === 'bg' ? translations.bg.qs : translations.bg.qs; // Fallback
        document.getElementById('progress').innerText = lang === 'bg' ? `Въпрос ${qIdx+1} от ${qsList.length}` : `Question ${qIdx+1} of ${qsList.length}`;
        document.getElementById('q-text').innerText = qsList[qIdx].t;
        document.getElementById('btn-sa').innerText = d.btns[0];
        document.getElementById('btn-a').innerText = d.btns[1];
        document.getElementById('btn-n').innerText = d.btns[2];
        document.getElementById('btn-d').innerText = d.btns[3];
        document.getElementById('btn-sd').innerText = d.btns[4];
    }

    function answer(m) {
        const qsList = translations.bg.qs;
        const q = qsList[qIdx];
        if(q.a === 'x') scoreX += m * q.w;
        else scoreY += m * q.w;

        qIdx++;
        if(qIdx >= qsList.length) finish();
        else updateQuiz();
    }

    function finish() {
        showScreen('screen-result');
        const d = translations[lang];
        const lab = document.getElementById('ideology-label');
        const recBox = document.getElementById('party-recommendation');
        let recText = `<b>Подходящи партии:</b><br>`;
        
        // FIX: Shared logic for Label AND Recommendation
        if (Math.abs(scoreX) < 5 && Math.abs(scoreY) < 5) {
            // CENTRIST CASE
            lab.innerText = d.labels[4]; 
            lab.style.color = "#475569"; lab.style.borderColor = "#475569";
            recText += d.parties.centrist;
        } else if (scoreX <= 0 && scoreY <= 0) {
            lab.innerText = d.labels[0]; lab.style.color = "#b91c1c"; lab.style.borderColor = "#b91c1c";
            recText += d.parties.authLeft;
        } else if (scoreX > 0 && scoreY <= 0) {
            lab.innerText = d.labels[1]; lab.style.color = "#1d4ed8"; lab.style.borderColor = "#1d4ed8";
            recText += d.parties.authRight;
        } else if (scoreX <= 0 && scoreY > 0) {
            lab.innerText = d.labels[2]; lab.style.color = "#047857"; lab.style.borderColor = "#047857";
            recText += d.parties.libLeft;
        } else {
            lab.innerText = d.labels[3]; lab.style.color = "#a16207"; lab.style.borderColor = "#a16207";
            recText += d.parties.libRight;
        }

        recBox.innerHTML = recText;
        draw();
    }

    function draw() {
        const canvas = document.getElementById('compassCanvas');
        const ctx = canvas.getContext('2d');
        const d = translations[lang];

        ctx.fillStyle = "#fecaca"; ctx.fillRect(0,0,200,200); 
        ctx.fillStyle = "#bfdbfe"; ctx.fillRect(200,0,200,200); 
        ctx.fillStyle = "#bbf7d0"; ctx.fillRect(0,200,200,200); 
        ctx.fillStyle = "#fef08a"; ctx.fillRect(200,200,200,200); 

        ctx.strokeStyle = "#000"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(200,0); ctx.lineTo(200,400); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,200); ctx.lineTo(400,200); ctx.stroke();

        ctx.fillStyle = "#000"; ctx.font = "bold 14px Arial";
        ctx.textAlign = "center";
        ctx.fillText(d.axes[0], 200, 20); ctx.fillText(d.axes[1], 200, 390);
        ctx.textAlign = "left"; ctx.fillText(d.axes[2], 5, 190);
        ctx.textAlign = "right"; ctx.fillText(d.axes[3], 395, 190);

        selectedLeaders.forEach(l => {
            const lx = 200 + (l.x * 20); const ly = 200 + (l.y * 20);
            ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.beginPath(); ctx.arc(lx, ly, 6, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#000"; ctx.font = "bold 12px Arial"; ctx.fillText(l.name, lx + 8, ly + 3);
        });

        const ux = 200 + (scoreX / 24 * 200);
        const uy = 200 + (scoreY / 24 * 200);
        ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(ux, uy, 12, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "red"; ctx.lineWidth = 4; ctx.stroke();
    }

    function searchLeaders() {
        const val = document.getElementById('leader-in').value.toLowerCase();
        const list = document.getElementById('leader-list');
        list.innerHTML = "";
        if(!val) return;
        leaders.filter(l => l.name.toLowerCase().includes(val)).forEach(l => {
            const div = document.createElement('div');
            div.className = 'leader-item';
            div.innerText = l.name;
            div.onclick = () => { if(!selectedLeaders.includes(l)) selectedLeaders.push(l); draw(); list.innerHTML = ""; };
            list.appendChild(div);
        });
    }
</script>
</body>
</html>
